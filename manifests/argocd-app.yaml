apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: playground-base
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/tanmay23here/k8s-playground-infra.git
    targetRevision: main
    path: base
  destination:
    server: https://kubernetes.default.svc
    namespace: platform-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
