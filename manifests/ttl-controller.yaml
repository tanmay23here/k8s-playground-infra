apiVersion: v1
kind: ServiceAccount
metadata:
  name: ttl-controller
  namespace: platform-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ttl-controller
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ttl-controller
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ttl-controller
subjects:
  - kind: ServiceAccount
    name: ttl-controller
    namespace: platform-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ttl-controller
  namespace: platform-system
spec:
  schedule: "*/2 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: ttl-controller
          restartPolicy: OnFailure
          containers:
            - name: ttl-controller
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  NOW=$(date +%s)
                  for ns in $(kubectl get ns -l managed-by=playground -o jsonpath='{.items[*].metadata.name}'); do
                    TTL=$(kubectl get ns $ns -o jsonpath='{.metadata.labels.ttl-expires-at}')
                    if [ -n "$TTL" ] && [ "$NOW" -gt "$TTL" ]; then
                      echo "Deleting expired namespace: $ns"
                      kubectl delete ns $ns
                    fi
                  done
