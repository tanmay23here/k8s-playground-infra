apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: playground-api
rules:
  - apiGroups: [""]
    resources: ["namespaces", "resourcequotas", "services", "persistentvolumeclaims", "serviceaccounts", "pods", "configmaps"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies", "ingresses"]
    verbs: ["get", "list", "create", "delete", "watch"]
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "create", "delete", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: playground-api
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: playground-api
subjects:
  - kind: ServiceAccount
    name: default
    namespace: default
